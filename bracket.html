<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EP World Cup 2026 – Knockout Bracket Challenge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#0f172a}
#root{min-height:100vh}
.fade{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.layout{display:flex;gap:14px;max-width:1400px;margin:0 auto;padding:14px}
.pane-left{width:300px;flex-shrink:0;position:sticky;top:14px;align-self:flex-start;max-height:calc(100vh - 28px);overflow-y:auto}
.pane-right{flex:1;min-width:0}
.card{background:white;border-radius:12px;padding:14px;border:1px solid #e2e8f0;margin-bottom:9px}
.btn-primary{background:#0f172a;color:white;border:none;border-radius:8px;padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.5px}
.btn-green{background:#059669;color:white;border:none;border-radius:8px;padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.5px}
.btn-gray{background:#94a3b8;color:white;border:none;border-radius:8px;padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.5px}
input[type=text],input[type=email],input[type=password],input[type=number]{width:100%;border:2px solid #e2e8f0;border-radius:8px;padding:8px 11px;font-size:14px;font-family:inherit;outline:none;transition:border .15s}
input:focus{border-color:#0f172a}
.bracket-wrap{overflow-x:auto;overflow-y:auto;background:white;border-radius:12px;border:1px solid #e2e8f0;padding:12px}
.round-header{display:flex;margin-bottom:8px}
.rh{text-align:center;font-size:9px;font-weight:800;letter-spacing:1.5px;color:#64748b;padding:4px 0;border-radius:6px;background:#f1f5f9}
/* game cards */
.gc{border:2px solid #e2e8f0;border-radius:8px;overflow:hidden;background:white;display:flex;flex-direction:column;justify-content:center}
.gc.has-result{border-color:#d1fae5}
.gc.editable .tr:hover{background:#f0fdf4;cursor:pointer}
.tr{display:flex;align-items:center;gap:5px;padding:0 8px;height:26px;font-size:11px;font-weight:500;transition:background .1s;user-select:none}
.tr.picked{background:#dcfce7;font-weight:800;color:#059669}
.tr.won{background:#dcfce7;font-weight:800;color:#059669}
.tr.lost{background:#fef2f2;color:#94a3b8;text-decoration:line-through}
.tr.tbd{color:#cbd5e1;font-style:italic}
.tr-div{height:1px;background:#f1f5f9;flex-shrink:0}
.pos-badge{font-size:9px;font-weight:800;border-radius:3px;padding:1px 4px;min-width:16px;text-align:center;flex-shrink:0}
.pos1{background:#fef3c7;color:#92400e}
.pos2{background:#f1f5f9;color:#475569}
.pos3{background:#fef3c7;color:#b45309}
/* connector SVG styling */
.conn-svg{flex-shrink:0}
/* admin */
.admin-tab{padding:7px 14px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.5px;border-bottom:3px solid transparent;font-family:inherit;color:#64748b}
.admin-tab.active{color:#0f172a;border-bottom-color:#0f172a}
.err{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;color:#dc2626;font-size:12px;margin-bottom:8px}
.suc{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px;color:#059669;font-size:12px;margin-bottom:8px}

@media print {
  body * { visibility: hidden; }
  #print-area, #print-area * { visibility: visible; }
  #print-area {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    zoom: 0.75;
  }
  .gc.editable .tr:hover { background: none !important; cursor: default !important; }
  @page { size: landscape; margin: 0.15in; }
  html, body { height: auto !important; overflow: visible !important; }
}
</style>
</head>
<body>
<div id="root"></div>
<script>
/* ── AZURE CONFIG (shared with group stage app) ── */
var AZ_ACCOUNT='wc2026pool';
var AZ_SAS='?sv=2026-02-06&ss=t&srt=o&sp=rwdlau&se=2026-08-02T00:26:01Z&st=2026-06-01T16:11:01Z&spr=https&sig=ZYiHlmhKPCiDIIm3W7nlrNQVjurms9Zs58GUfq1sNJY%3D';
var AZ_BASE='https://'+AZ_ACCOUNT+'.table.core.windows.net';
var AZ_HDR={'Content-Type':'application/json','Accept':'application/json;odata=nometadata','x-ms-version':'2020-12-06','DataServiceVersion':'3.0;NetFx'};
var AZ_HDR_IF=Object.assign({'If-Match':'*'},AZ_HDR);

function azUrl(t,pk,rk){if(pk&&rk)return AZ_BASE+'/'+t+'(PartitionKey=\''+pk+'\',RowKey=\''+rk+'\')'+AZ_SAS;return AZ_BASE+'/'+t+'()'+AZ_SAS;}
function azQuery(t,pk){return fetch(azUrl(t)+'&$filter=PartitionKey%20eq%20\''+pk+'\'',{headers:AZ_HDR}).then(function(r){return r.json();}).then(function(d){return d&&d.value?d.value:[];}).catch(function(){return[];});}
function azGet(t,pk,rk){return fetch(azUrl(t,pk,rk),{headers:AZ_HDR}).then(function(r){return r.status===404?null:r.json();}).catch(function(){return null;});}
function azInsert(t,e){return fetch(AZ_BASE+'/'+t+AZ_SAS,{method:'POST',headers:AZ_HDR,body:JSON.stringify(e)}).then(function(r){return r.ok;}).catch(function(){return false;});}
function azUpsert(t,e){return fetch(azUrl(t,e.PartitionKey,e.RowKey),{method:'PUT',headers:AZ_HDR,body:JSON.stringify(e)}).then(function(r){return r.ok;}).catch(function(){return false;});}
function azDel(t,pk,rk){return fetch(azUrl(t,pk,rk),{method:'DELETE',headers:AZ_HDR_IF}).then(function(r){return r.ok;}).catch(function(){return false;});}
function azCreateTable(t){return fetch(AZ_BASE+'/Tables'+AZ_SAS,{method:'POST',headers:AZ_HDR,body:JSON.stringify({TableName:t})}).then(function(r){return r.ok||r.status===409;}).catch(function(){return false;});}
function azDelAll(t,pk){return azQuery(t,pk).then(function(rows){return Promise.all(rows.map(function(e){return azDel(t,e.PartitionKey,e.RowKey);}));});}

/* ── ADMIN PASSWORD ── */
var ADMIN_PW='worldcup2026';

/* ── DEADLINE: July 4, 2026 1:00 PM ET (17:00 UTC) ── */
var DEADLINE=new Date('2026-07-04T17:00:00Z');
function isPastDeadline(){return new Date()>=DEADLINE;}
function timeUntilDeadline(){var diff=DEADLINE-new Date();if(diff<=0)return null;var d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);if(d>0)return d+'d '+h+'h';if(h>0)return h+'h '+m+'m';return m+'m';}

/* ── TEAM DATA ── */
var FLAGS={'Canada':'🇨🇦','South Africa':'🇿🇦','Brazil':'🇧🇷','Japan':'🇯🇵','Germany':'🇩🇪','Paraguay':'🇵🇾','Netherlands':'🇳🇱','Morocco':'🇲🇦','Ivory Coast':'🇨🇮','Norway':'🇳🇴','France':'🇫🇷','Sweden':'🇸🇪','Mexico':'🇲🇽','Ecuador':'🇪🇨','England':'EN','DR Congo':'🇨🇩','Belgium':'🇧🇪','Senegal':'🇸🇳','USA':'🇺🇸','Bosnia-Herzegovina':'🇧🇦','Spain':'🇪🇸','Austria':'🇦🇹','Portugal':'🇵🇹','Croatia':'🇭🇷','Switzerland':'🇨🇭','Algeria':'🇩🇿','Colombia':'🇨🇴','Ghana':'🇬🇭','Australia':'🇦🇺','Egypt':'🇪🇬','Argentina':'🇦🇷','Cape Verde':'🇨🇻'};
var TEAM_POS={'Mexico':1,'South Africa':2,'Switzerland':1,'Canada':2,'Bosnia-Herzegovina':3,'Brazil':1,'Morocco':2,'USA':1,'Australia':2,'Paraguay':3,'Germany':1,'Ivory Coast':2,'Ecuador':3,'Netherlands':1,'Japan':2,'Sweden':3,'Belgium':1,'Egypt':2,'Spain':1,'Cape Verde':2,'France':1,'Norway':2,'Senegal':3,'Argentina':1,'Austria':2,'Algeria':3,'Colombia':1,'Portugal':2,'DR Congo':3,'England':1,'Croatia':2,'Ghana':3};

/* ── BRACKET STRUCTURE ── */
/* R32 games indexed 0-15 */
var R32=[
  {t1:'Canada',t2:'South Africa'},         // 0
  {t1:'Brazil',t2:'Japan'},                // 1
  {t1:'Germany',t2:'Paraguay'},            // 2
  {t1:'Netherlands',t2:'Morocco'},         // 3
  {t1:'Ivory Coast',t2:'Norway'},          // 4
  {t1:'France',t2:'Sweden'},               // 5
  {t1:'Mexico',t2:'Ecuador'},              // 6
  {t1:'England',t2:'DR Congo'},            // 7
  {t1:'Belgium',t2:'Senegal'},             // 8
  {t1:'USA',t2:'Bosnia-Herzegovina'},      // 9
  {t1:'Spain',t2:'Austria'},               // 10
  {t1:'Portugal',t2:'Croatia'},            // 11
  {t1:'Switzerland',t2:'Algeria'},         // 12
  {t1:'Colombia',t2:'Ghana'},              // 13
  {t1:'Australia',t2:'Egypt'},             // 14
  {t1:'Argentina',t2:'Cape Verde'},        // 15
];
/* R32 display order: pairs that feed each R16 game appear consecutively */
var R32_DISP=[2,5,0,3,11,10,9,8,1,4,6,7,15,14,12,13];
/* Which R32 games feed each R16 game */
var R16_FEED=[[0,3],[2,5],[1,4],[6,7],[11,10],[9,8],[15,14],[12,13]];
var R16_DISP=[1,0,4,5,2,3,6,7]; /* visual display order for R16 games */
var QF_FEED=[[1,0],[4,5],[2,3],[6,7]];
var SF_FEED=[[0,1],[2,3]];
/* Round labels */
var ROUND_LABELS=['Round of 32','Round of 16','Quarterfinals','Semifinals','Final'];
var ROUND_MULTS={r16:2,qf:4,sf:8,f:16};

function initPicks(){return{r32:Array(16).fill(null),r16:Array(8).fill(null),qf:Array(4).fill(null),sf:Array(2).fill(null),f:null};}

function getAvailTeams(round,idx,picks){
  if(round==='r32'){var g=R32[R32_DISP[idx]];return[g.t1,g.t2];}
  if(round==='r16'){return R16_FEED[idx].map(function(i){return picks.r32[i]||null;});}
  if(round==='qf'){return QF_FEED[idx].map(function(i){return picks.r16[i]||null;});}
  if(round==='sf'){return SF_FEED[idx].map(function(i){return picks.qf[i]||null;});}
  if(round==='f'){return[picks.sf[0]||null,picks.sf[1]||null];}
  return[null,null];
}

function validatePicks(picks){
  /* Clear any picks that are no longer valid based on upstream changes */
  var p=picks;
  for(var j=0;j<8;j++){if(p.r16[j]){var av=R16_FEED[j].map(function(i){return p.r32[i];});if(av.indexOf(p.r16[j])<0)p.r16[j]=null;}}
  for(var j=0;j<4;j++){if(p.qf[j]){var av=QF_FEED[j].map(function(i){return p.r16[i];});if(av.indexOf(p.qf[j])<0)p.qf[j]=null;}}
  for(var j=0;j<2;j++){if(p.sf[j]){var av=SF_FEED[j].map(function(i){return p.qf[i];});if(av.indexOf(p.sf[j])<0)p.sf[j]=null;}}
  if(p.f&&[p.sf[0],p.sf[1]].indexOf(p.f)<0)p.f=null;
  return p;
}
/* Auto-fill picks from known results — called on load and after each pick */
function applyKnownResults(forceOverride){
  /* forceOverride=true: also correct wrong picks (use when loading existing bracket for edit)
     forceOverride=false (default): only fill null slots (use for new brackets) */
  if(!S.results)return;
  var changed=false,corrections=0;
  ['r32','r16','qf','sf'].forEach(function(round){
    var arr=S.results[round];
    if(!arr)return;
    for(var i=0;i<arr.length;i++){
      if(arr[i]){
        var needsFill=!S.picks[round][i];
        var needsCorrect=forceOverride&&S.picks[round][i]&&S.picks[round][i]!==arr[i];
        if(needsCorrect)corrections++;
        if(needsFill||needsCorrect){S.picks[round][i]=arr[i];changed=true;}
      }
    }
  });
  if(S.results.f){
    if(!S.picks.f||(forceOverride&&S.picks.f!==S.results.f)){
      if(forceOverride&&S.picks.f)corrections++;
      S.picks.f=S.results.f;changed=true;
    }
  }
  if(forceOverride)S.autoFixed=corrections;
  if(changed)S.picks=validatePicks(S.picks);
}



function countPicks(picks){
  var n=0;
  picks.r32.forEach(function(p){if(p)n++;});
  picks.r16.forEach(function(p){if(p)n++;});
  picks.qf.forEach(function(p){if(p)n++;});
  picks.sf.forEach(function(p){if(p)n++;});
  if(picks.f)n++;
  return n; /* max 31 */
}

function scoreEntry(sub,results){
  if(!results)return 0;
  var total=0;
  /* R16 scoring */
  if(results.r16)for(var j=0;j<8;j++){if(sub.picks.r16[j]&&results.r16[j]&&sub.picks.r16[j]===results.r16[j]){total+=TEAM_POS[sub.picks.r16[j]]*ROUND_MULTS.r16;}}
  /* QF */
  if(results.qf)for(var j=0;j<4;j++){if(sub.picks.qf[j]&&results.qf[j]&&sub.picks.qf[j]===results.qf[j]){total+=TEAM_POS[sub.picks.qf[j]]*ROUND_MULTS.qf;}}
  /* SF */
  if(results.sf)for(var j=0;j<2;j++){if(sub.picks.sf[j]&&results.sf[j]&&sub.picks.sf[j]===results.sf[j]){total+=TEAM_POS[sub.picks.sf[j]]*ROUND_MULTS.sf;}}
  /* Final */
  if(results.f&&sub.picks.f&&sub.picks.f===results.f){total+=TEAM_POS[sub.picks.f]*ROUND_MULTS.f;}
  return total;
}

function getInvalidPicks(sub,results){
  /* Flag players who picked the LOSING team in any completed R32 game */
  if(!results||!results.r32)return[];
  var invalid=[];
  for(var i=0;i<16;i++){
    var actualWinner=results.r32[i];
    if(!actualWinner)continue;
    var playerPick=sub.picks.r32[i];
    if(playerPick&&playerPick!==actualWinner){
      invalid.push({round:'R32',game:i+1,picked:playerPick,actualWinner:actualWinner,msg:playerPick+' lost to '+actualWinner+' in Round of 32'});
    }
  }
  return invalid;
}

/* ── STATE ── */
var S={
  view:'home',
  picks:initPicks(),
  alreadySubmitted:null, /* email of existing submission on this browser */
  autoFixed:0, /* number of picks auto-corrected from known results */
  emailExists:false, /* real-time duplicate email check */
  form:{entryName:'',participantName:'',email:'',password:'',tiebreaker:''},
  submitDone:false,submitErr:'',
  editId:null,editLookup:false,editErr:'',
  editLookupForm:{nameOrEmail:'',password:''},
  adminEditId:null,
  subs:[],
  results:null,
  adminPW:'',adminPWErr:'',lbAdminMode:false,adminSaved:false,adminTab:'results',
  expLb:null,
};

function loadData(){
  /* Ensure tables exist first (no-op if already created; 409=already exists) */
  Promise.all([azCreateTable('bpicks'),azCreateTable('bresults')]).then(function(){
    return Promise.all([azQuery('bpicks','subs'),azGet('bresults','results','main')]);
  }).then(function(res){
    var rows=res[0],rEnt=res[1];
    S.subs=rows.map(function(e){return{id:e.RowKey,entryName:e.entryName,participantName:e.participantName,email:e.email,tiebreaker:e.tiebreaker,password:e.password||'',picks:JSON.parse(e.picksData||'{}'),timestamp:e.timestamp};});
    S.results=rEnt?JSON.parse(rEnt.data||'null'):null;
    applyKnownResults();
    /* Check localStorage: if this browser already submitted, remember it */
    try{
      var storedEmail=localStorage.getItem('bkt_email');
      if(storedEmail&&!S.editId){
        var found=S.subs.find(function(s){return s.email.toLowerCase()===storedEmail.toLowerCase();});
        if(found)S.alreadySubmitted=found.email;
      }
    }catch(e){}
    render();
  }).catch(function(){render();});
}

function saveResults(){return azUpsert('bresults',{PartitionKey:'results',RowKey:'main',data:JSON.stringify(S.results)});}

/* Build a picks object from actual results so the bracket visual shows what really happened */
function picksFromResults(results){
  var p=initPicks();
  if(!results)return p;
  ['r32','r16','qf','sf'].forEach(function(round){
    var arr=results[round];
    if(!arr)return;
    for(var i=0;i<arr.length;i++){if(arr[i])p[round][i]=arr[i];}
  });
  if(results.f)p.f=results.f;
  return validatePicks(p);
}

/* ── RENDER ── */
function render(){document.getElementById('root').innerHTML=buildApp();restoreInputs();}

function buildApp(){
  if(S.view==='home')return buildHome();
  if(S.view==='bracket')return buildHeader()+buildBracketPage();
  if(S.view==='leaderboard')return buildHeader()+buildLeaderboard();
  if(S.view==='admin')return buildHeader()+buildAdmin();
  return buildHeader()+buildHome();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function flag(t){var f=FLAGS[t]||'🏳️';if(f==='EN')return'<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:14px;background:white;border:1px solid #e2e8f0;border-radius:2px;font-size:8px;font-weight:800;color:#012169;margin-right:2px">EN</span>';return '<span style="font-size:14px;line-height:1;margin-right:2px">'+f+'</span>';}
function posBadge(t){var p=TEAM_POS[t];if(!p)return'';var cl=p===1?'pos1':p===2?'pos2':'pos3';var lbl=p===1?'1st':p===2?'2nd':'3rd';return'<span class="pos-badge '+cl+'">'+lbl+'</span>';}

function buildHome(){
  var dl=timeUntilDeadline();
  var dlMsg=isPastDeadline()?'🔒 Bracket submissions are closed (deadline was July 4 at 1:00 PM ET)':dl?'⏰ Bracket deadline: July 4 at 1:00 PM ET ('+dl+' remaining)':'';
  return '<div style="min-height:100vh;background:#0a0f1e;font-family:system-ui,sans-serif">'
    +'<div style="background:linear-gradient(135deg,#0a0f1e 0%,#1e3a5f 60%,#0a3d2e 100%);padding:40px 20px 32px;text-align:center;position:relative;overflow:hidden">'
    +'<div style="position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 0,transparent 50%);background-size:22px 22px"></div>'
    +'<div style="position:relative">'
    +'<div style="font-size:48px;margin-bottom:8px">🏆</div>'
    +'<div style="font-size:10px;letter-spacing:4px;color:#94a3b8;font-weight:700;margin-bottom:6px">ENTERPRISE PLATFORMS · FIFA</div>'
    +'<div style="font-size:38px;font-weight:900;color:white;letter-spacing:1px;line-height:1;margin-bottom:4px">KNOCKOUT BRACKET</div>'
    +'<div style="font-size:52px;font-weight:900;color:#fbbf24;letter-spacing:2px;line-height:1;margin-bottom:8px">CHALLENGE 2026</div>'
    +'<div style="font-size:13px;font-weight:700;color:#86efac;letter-spacing:3px;margin-bottom:16px">ROUND OF 32 → FINAL</div>'
    +(dlMsg?'<div style="display:inline-block;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.4);border-radius:99px;padding:6px 18px;font-size:12px;font-weight:700;color:#fbbf24;letter-spacing:.5px">'+dlMsg+'</div>':'')
    +'<div style="margin-top:14px;font-size:12px;color:#94a3b8">Questions or issues? Contact <a href="mailto:jerry.hanes@coxautoinc.com" style="color:#7dd3fc;font-weight:700;text-decoration:none">Jerry Hanes</a></div>'
    +'</div></div>'
    +'<div style="max-width:700px;margin:0 auto;padding:28px 20px 40px">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'
    /* Submit bracket card */
    +'<div style="background:linear-gradient(160deg,#1e3a5f,#0f2040);border:2px solid rgba(251,191,36,.4);border-radius:14px;padding:20px;cursor:pointer;display:flex;flex-direction:column;gap:10px" onclick="S.view=\'bracket\';render()">'
    +'<div style="text-align:center;font-size:36px;margin-bottom:4px">📋</div>'
    +'<div style="font-size:14px;font-weight:900;color:white;text-align:center">FILL OUT BRACKET</div>'
    +'<p style="font-size:12px;color:#94a3b8;line-height:1.5;text-align:center">Pick the winner of every game from Round of 32 through the Final.</p>'
    +'<button onclick="event.stopPropagation();goToMyBracket()" style="background:#fbbf24;color:#0a0f1e;border:none;border-radius:8px;padding:9px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;width:100%">📋 '+(isPastDeadline()?'VIEW MY BRACKET':'SUBMIT / EDIT BRACKET')+'</button>'
    +'</div>'
    /* Leaderboard card */
    +'<div style="background:linear-gradient(160deg,#1a1a3e,#0f1020);border:2px solid rgba(99,102,241,.4);border-radius:14px;padding:20px;cursor:pointer;display:flex;flex-direction:column;gap:10px" onclick="S.view=\'leaderboard\';render()">'
    +'<div style="text-align:center;font-size:36px;margin-bottom:4px">🏆</div>'
    +'<div style="font-size:14px;font-weight:900;color:white;text-align:center">LEADERBOARD</div>'
    +'<p style="font-size:12px;color:#94a3b8;line-height:1.5;text-align:center">Scoring starts in the Round of 16. Points = group finish × round multiplier.</p>'
    +'<button onclick="event.stopPropagation();S.view=\'leaderboard\';render()" style="background:#6366f1;color:white;border:none;border-radius:8px;padding:9px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;width:100%">🏆 VIEW LEADERBOARD</button>'
    +'</div></div>'
    /* Invalid Picks table */
    +(function(){
      var invalid=[];
      S.subs.forEach(function(s){
        var inv=getInvalidPicks(s,S.results);

/* ── BRACKET VISUAL ── */
function buildBracketVisual(picks,results,editable){
  var R=56,B=8,GW=185,CW=18; /* R=R32 game height, B=break between pairs */
  var totalH=16*R+7*B; /* 952px */

  /* Absolute top position for display slot dp in each round */
  function gTop(round,dp){
    if(round==='r32') return Math.floor(dp/2)*B+dp*R;
    if(round==='r16') return dp*(2*R+B);
    if(round==='qf')  return dp*2*(2*R+B);
    if(round==='sf')  return dp*4*(2*R+B);
    return 0;
  }
  /* Card slot height for each round */
  function gH(round){
    if(round==='r32') return R;
    if(round==='r16') return 2*R;
    if(round==='qf')  return 4*R+B;
    if(round==='sf')  return 8*R+3*B;
    return totalH;
  }
  /* Y-center for display slot dp */
  function gCenter(round,dp){ return gTop(round,dp)+gH(round)/2; }

  /* Team options — gIdx is the ACTUAL game index, not display position */
  function getTeams(round,gIdx){
    if(round==='r32'){var g=R32[gIdx];return{t1:g.t1,t2:g.t2};}
    if(round==='r16'){var f=R16_FEED[gIdx];return{t1:picks.r32[f[0]]||null,t2:picks.r32[f[1]]||null};}
    if(round==='qf') {var f=QF_FEED[gIdx];return{t1:picks.r16[f[0]]||null,t2:picks.r16[f[1]]||null};}
    if(round==='sf') {var f=SF_FEED[gIdx];return{t1:picks.qf[f[0]]||null,t2:picks.qf[f[1]]||null};}
    return{t1:picks.sf[0]||null,t2:picks.sf[1]||null};
  }
  function getResult(round,gIdx){if(!results)return null;var arr=results[round];return arr?(Array.isArray(arr)?arr[gIdx]:arr):null;}
  function getPick(round,gIdx){if(round==='f')return picks.f;var arr=picks[round];return arr?arr[gIdx]:null;}

  function teamRow(team,round,gIdx,pick,result){
    if(!team)return'<div class="tr tbd">TBD</div>';
    var eliminated=result&&result!==team;
    var won=result&&result===team;
    var isPicked=!result&&pick===team;
    var cls='tr'+(won?' won':eliminated?' lost':isPicked?' picked':'');
    /* Allow clicking the actual R32 winner when the user's pick is wrong */
    var canPick=editable&&!result&&!eliminated&&!!team;
    var canFix=editable&&round==='r32'&&won&&pick!==team&&!!team;
    var action='';
    if(canPick)action='data-action="pick" data-round="'+round+'" data-game="'+gIdx+'" data-team="'+esc(team)+'"';
    else if(canFix)action='data-action="fix-r32-pick" data-game="'+gIdx+'" data-team="'+esc(team)+'"';
    var cursor=(canPick||canFix)?'pointer':'default';
    var fixHint=canFix?'<span style="font-size:9px;color:#059669;margin-left:4px;font-weight:700">← tap to fix</span>':'';
    return'<div class="'+cls+'" '+action+' style="cursor:'+cursor+';'+(canFix?'outline:2px solid #059669;outline-offset:-2px;':'')+'">'
      +flag(team)+posBadge(team)
      +'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">'+esc(team)+fixHint+'</span>'
      +'</div>';
  }

  function gameCard(round,gIdx,dp){
    var t=getTeams(round,gIdx);
    var result=getResult(round,gIdx);
    var pick=getPick(round,gIdx);
    var top=gTop(round,dp);
    var height=gH(round);
    var innerTop=Math.max(0,(height-54)/2);
    var hasResult=!!result;
    return'<div class="gc'+(hasResult?' has-result':editable?' editable':'')+'" style="position:absolute;top:'+(top+innerTop)+'px;left:0;width:'+GW+'px;height:54px;border:1px solid '+(hasResult?'#86efac':'#e2e8f0')+';">'
      +teamRow(t.t1,round,gIdx,pick,result)
      +'<div class="tr-div"></div>'
      +teamRow(t.t2,round,gIdx,pick,result)
      +'</div>';
  }

  /* Connector SVG — draws lines using exact centers */
  function connSVG(srcRound,dstRound,nPairs){
    var lines='',s='stroke="#cbd5e1" stroke-width="1.5"';
    for(var k=0;k<nPairs;k++){
      var c0=gCenter(srcRound,2*k),c1=gCenter(srcRound,2*k+1),cd=gCenter(dstRound,k);
      lines+='<line x1="0" y1="'+c0+'" x2="'+(CW/2)+'" y2="'+c0+'" '+s+'/>';
      lines+='<line x1="'+(CW/2)+'" y1="'+c0+'" x2="'+(CW/2)+'" y2="'+cd+'" '+s+'/>';
      lines+='<line x1="0" y1="'+c1+'" x2="'+(CW/2)+'" y2="'+c1+'" '+s+'/>';
      lines+='<line x1="'+(CW/2)+'" y1="'+c1+'" x2="'+(CW/2)+'" y2="'+cd+'" '+s+'/>';
      lines+='<line x1="'+(CW/2)+'" y1="'+cd+'" x2="'+CW+'" y2="'+cd+'" '+s+'/>';
    }
    return'<svg width="'+CW+'" height="'+totalH+'" class="conn-svg">'+lines+'</svg>';
  }

  /* Round column — disp[] maps display pos → actual game index */
  function roundCol(round,count,disp){
    var col='<div style="position:relative;width:'+GW+'px;height:'+totalH+'px;flex-shrink:0">';
    for(var dp=0;dp<count;dp++){
      var gIdx=disp?disp[dp]:dp;
      col+=gameCard(round,gIdx,dp);
    }
    return col+'</div>';
  }

  var rounds=[
    {round:'r32',count:16,label:'Round of 32',disp:R32_DISP,next:'r16',nPairs:8},
    {round:'r16',count:8, label:'Round of 16',disp:R16_DISP,next:'qf', nPairs:4},
    {round:'qf', count:4, label:'Quarters',               next:'sf', nPairs:2},
    {round:'sf', count:2, label:'Semis',                  next:'f',  nPairs:1},
    {round:'f',  count:1, label:'Final'},
  ];

  var headers='<div style="display:flex;margin-bottom:6px">';
  rounds.forEach(function(rd,i){
    headers+='<div class="rh" style="width:'+GW+'px;flex-shrink:0">'+rd.label+'</div>';
    if(i<rounds.length-1)headers+='<div style="width:'+CW+'px;flex-shrink:0"></div>';
  });
  headers+='</div>';

  var bracket='<div style="display:flex;align-items:flex-start">';
  rounds.forEach(function(rd){
    bracket+=roundCol(rd.round,rd.count,rd.disp);
    if(rd.next)bracket+=connSVG(rd.round,rd.next,rd.nPairs);
  });
  bracket+='</div>';

  return'<div style="min-width:1000px">'+headers+bracket+'</div>';
}

function buildAdminResults(){
  if(!S.results)S.results={r32:Array(16).fill(null),r16:Array(8).fill(null),qf:Array(4).fill(null),sf:Array(2).fill(null),f:null,totalGoals:''};

  var html='<div style="padding:14px"><div style="max-width:1400px;margin:0 auto">';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';

  var roundDefs=[
    {key:'r32',label:'Round of 32',count:16,disp:R32_DISP},
    {key:'r16',label:'Round of 16',count:8, disp:R16_DISP},
    {key:'qf', label:'Quarterfinals',count:4},
    {key:'sf', label:'Semifinals',  count:2},
    {key:'f',  label:'Final',       count:1},
  ];

  /* Returns ALL possible original teams for a given game slot —
     admin can always set any result regardless of earlier round completion */
  function adminTeams(round,j){
    if(round==='r32')return[R32[j].t1,R32[j].t2];
    if(round==='r16'){var f=R16_FEED[j];return[R32[f[0]].t1,R32[f[0]].t2,R32[f[1]].t1,R32[f[1]].t2];}
    if(round==='qf'){var t=[];QF_FEED[j].forEach(function(r){R16_FEED[r].forEach(function(r2){t.push(R32[r2].t1,R32[r2].t2);});});return t;}
    if(round==='sf'){var t=[];SF_FEED[j].forEach(function(q){QF_FEED[q].forEach(function(r){R16_FEED[r].forEach(function(r2){t.push(R32[r2].t1,R32[r2].t2);});});});return t;}
    var t=[];R32.forEach(function(g){t.push(g.t1,g.t2);});return t;
  }
  /* Display label: confirmed result when available, else original teams */
  function adminLabel(round,j){
    if(round==='r32'){var g=R32[j];return g.t1+' vs '+g.t2;}
    var prev={r16:'r32',qf:'r16',sf:'qf',f:'sf'}[round];
    var feed=round==='r16'?R16_FEED[j]:round==='qf'?QF_FEED[j]:round==='sf'?SF_FEED[j]:[0,1];
    var a=S.results[prev]&&S.results[prev][feed[0]]||'TBD';
    var b=S.results[prev]&&S.results[prev][feed[1]]||'TBD';
    return a+' vs '+b;
  }

  roundDefs.forEach(function(rd){
    html+='<div class="card"><div style="font-size:12px;font-weight:800;letter-spacing:1px;color:#0f172a;margin-bottom:10px">'+rd.label.toUpperCase()+'</div>';
    var count=rd.count;
    for(var d=0;d<count;d++){
      var j=rd.disp?rd.disp[d]:d; /* actual game index */
      var resVal=S.results[rd.key]?S.results[rd.key][j]||'':'';
      var opts=adminTeams(rd.key,j);
      var label=adminLabel(rd.key,j);
      var hasResult=!!resVal;
      /* Add a visual break between bracket pairs (every 2 games in R32/R16) */
      var pairBreak=(rd.key==='r32'||rd.key==='r16')&&d>0&&d%2===0?'margin-top:8px;border-top:2px solid #f1f5f9;':'';
      html+='<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f8fafc;'+pairBreak+'">';
      html+='<span style="font-size:10px;font-weight:700;color:#94a3b8;min-width:20px">'+(d+1)+'</span>';
      html+='<span style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:'+(hasResult?'#059669':'inherit')+'">'+esc(label)+(hasResult?' ✓ '+resVal:'')+'</span>';
      html+='<select data-action="set-result" data-round="'+rd.key+'" data-idx="'+j+'" style="font-size:11px;border:1px solid '+(hasResult?'#86efac':'#e2e8f0')+';border-radius:6px;padding:3px 6px;background:white;font-family:inherit;color:#0f172a">'
        +'<option value="">-- Winner --</option>';
      opts.forEach(function(team){
        html+='<option value="'+esc(team)+'"'+(resVal===team?' selected':'')+'>'+esc(team)+'</option>';
      });
      html+='</select>';
      html+='</div>';
    }
    html+='</div>';
  });
  html+='</div>'; /* end grid */

  /* Tiebreaker + save */
  html+='<div class="card" style="margin-top:14px">'
    +'<div style="font-size:12px;font-weight:800;letter-spacing:1px;color:#0f172a;margin-bottom:8px">⚖ TIEBREAKER — TOTAL KNOCKOUT GOALS</div>'
    +'<p style="font-size:11px;color:#64748b;margin-bottom:8px">Total goals scored across all knockout rounds (R32 through Final).</p>'
    +'<input id="a-tg" type="number" min="0" placeholder="Enter total knockout goals" style="max-width:220px;margin-bottom:10px" oninput="S.results.totalGoals=this.value">'
    +(S.adminSaved?'<div class="suc">✅ Results saved and scores updated!</div>':'')
    +'<div style="position:sticky;bottom:0;background:linear-gradient(to bottom,transparent,white 40%);padding-top:10px">'
    +'<button data-action="save-bracket-results" class="btn-green" style="width:100%;padding:13px;font-size:13px;letter-spacing:.5px">💾 SAVE ALL RESULTS & CALCULATE SCORES</button>'
    +'</div></div>';

  return html+'</div></div>';
}

/* ── SUBMIT / UPDATE LOGIC ── */
function goToMyBracket(){
  /* Load the user's existing bracket (if known) before navigating to the bracket view */
  var email=(S.alreadySubmitted||S.form.email||'').toLowerCase().trim();
  if(email){
    var me=S.subs.find(function(s){return s.email.toLowerCase().trim()===email;});
    if(me){
      S.editId=me.id;
      S.picks=JSON.parse(JSON.stringify(me.picks));
      applyKnownResults(true);
      S.form={entryName:me.entryName,participantName:me.participantName,email:me.email,tiebreaker:me.tiebreaker,password:me.password||''};
    }
  }
  S.submitDone=false;S.view='bracket';render();
}

function checkEmailExists(){
  var email=S.form.email.toLowerCase().trim();
  S.emailExists=email.length>3&&S.subs.some(function(s){return s.email.toLowerCase().trim()===email;});
  render();
}

function doSubmitBracket(){
  if(isPastDeadline()&&!S.adminEditId){S.submitErr='Bracket submissions are closed.';render();return;}
  S.submitErr='';var f=S.form;
  if(!f.entryName.trim()){S.submitErr='Entry name is required.';render();return;}
  if(!f.participantName.trim()){S.submitErr='Participant name is required.';render();return;}
  if(!/^[^@]+@[^@]+\.[^@]+$/.test(f.email.trim())){S.submitErr='Valid email required.';render();return;}
  if(!f.password.trim()){S.submitErr='Password is required.';render();return;}
  if(f.tiebreaker===''||isNaN(Number(f.tiebreaker))||Number(f.tiebreaker)<0){S.submitErr='Enter a valid tiebreaker guess.';render();return;}
  if(countPicks(S.picks)<31){S.submitErr='Please complete all 31 picks.';render();return;}
  /* Duplicate email check */
  if(S.subs.filter(function(s){return s.email.toLowerCase().trim()===f.email.toLowerCase().trim();}).length>0){S.submitErr='That email already has a bracket. Use ✏️ Edit My Bracket to update.';render();return;}
  var sub={id:String(Date.now()),entryName:f.entryName.trim(),participantName:f.participantName.trim(),email:f.email.trim(),tiebreaker:Number(f.tiebreaker),password:f.password.trim(),picks:JSON.parse(JSON.stringify(S.picks)),timestamp:new Date().toISOString()};
  var entity={PartitionKey:'subs',RowKey:sub.id,entryName:sub.entryName,participantName:sub.participantName,email:sub.email,tiebreaker:sub.tiebreaker,picksData:JSON.stringify(sub.picks),timestamp:sub.timestamp,password:sub.password};
  azInsert('bpicks',entity).then(function(ok){
    if(ok){S.subs.push(sub);S.submitDone=true;try{localStorage.setItem('bkt_email',sub.email);}catch(e){}S.alreadySubmitted=sub.email;render();}
    else{S.submitErr='Failed to save. Please try again.';render();}
  });
}

function doUpdateBracket(){
  if(isPastDeadline()&&!S.adminEditId){S.submitErr='Bracket submissions are closed.';render();return;}
  S.submitErr='';var f=S.form;
  if(!f.entryName.trim()||!f.participantName.trim()||!/^[^@]+@[^@]+\.[^@]+$/.test(f.email.trim())){S.submitErr='Please fill in all required fields.';render();return;}
  if(f.tiebreaker===''||isNaN(Number(f.tiebreaker))){S.submitErr='Enter a valid tiebreaker.';render();return;}
  if(countPicks(S.picks)<31){S.submitErr='Please complete all 31 picks.';render();return;}
  var sub={id:S.editId,entryName:f.entryName.trim(),participantName:f.participantName.trim(),email:f.email.trim(),tiebreaker:Number(f.tiebreaker),password:f.password||f.form_password||'',picks:JSON.parse(JSON.stringify(S.picks)),timestamp:new Date().toISOString()};
  var entity={PartitionKey:'subs',RowKey:sub.id,entryName:sub.entryName,participantName:sub.participantName,email:sub.email,tiebreaker:sub.tiebreaker,picksData:JSON.stringify(sub.picks),timestamp:sub.timestamp,password:sub.password};
  azUpsert('bpicks',entity).then(function(ok){
    if(ok){var idx=S.subs.findIndex(function(s){return s.id===S.editId;});if(idx>=0)S.subs[idx]=sub;var wasAdmin=S.adminEditId;S.submitDone=true;S.editId=null;S.adminEditId=null;if(wasAdmin)S.view='admin';render();}
    else{S.submitErr='Failed to save.';render();}
  });
}

function doEditLookup(){
  var f=S.editLookupForm;
  if(!f.nameOrEmail.trim()||!f.password.trim()){S.editErr='Enter your entry name/email and password.';render();return;}
  var match=S.subs.find(function(s){var nm=s.entryName&&s.entryName.toLowerCase().trim()===f.nameOrEmail.toLowerCase().trim();var em=s.email&&s.email.toLowerCase().trim()===f.nameOrEmail.toLowerCase().trim();return(nm||em)&&s.password===f.password.trim();});
  if(!match){S.editErr='No bracket found. Check name/email and password.';render();return;}
  S.editId=match.id;S.form={entryName:match.entryName,participantName:match.participantName,email:match.email,tiebreaker:match.tiebreaker,password:match.password};
  S.picks=JSON.parse(JSON.stringify(match.picks));applyKnownResults(true);S.editErr='';S.editLookup=false;render();
}

function doAdminEditBracket(id){
  var sub=S.subs.find(function(s){return s.id===id;});if(!sub)return;
  S.editId=id;S.adminEditId=id;S.editLookup=false;
  S.form={entryName:sub.entryName,participantName:sub.participantName,email:sub.email,tiebreaker:sub.tiebreaker,password:sub.password||''};
  S.picks=JSON.parse(JSON.stringify(sub.picks));applyKnownResults(true);
  S.submitDone=false;S.submitErr='';S.view='bracket';render();
}

function doTryAdmin(){if(S.adminPW===ADMIN_PW){S.view='admin';S.lbAdminMode=false;S.adminPWErr='';render();}else{S.adminPWErr='Incorrect password.';render();}}

function doExportInvalidCSV(){
  var rows=[['Entry Name','Participant','Email','Invalid Pick','Reason','Date']];
  var today=new Date().toLocaleDateString();
  S.subs.forEach(function(s){
    var inv=getInvalidPicks(s,S.results);
    inv.forEach(function(x){rows.push([s.entryName,s.participantName,s.email,x.picked,x.msg,today]);});
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='invalid_bracket_picks_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

function doExportBracketCSV(){
  var rows=[['Entry Name','Participant','Email','Champion Pick','Tiebreaker','Picks Complete','Score','Submitted']];
  S.subs.forEach(function(s){rows.push([s.entryName,s.participantName,s.email,s.picks.f||'',s.tiebreaker,countPicks(s.picks),scoreEntry(s,S.results),s.timestamp]);});
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='bracket_entries_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

/* ── INPUT RESTORE ── */
function sv(id,val){var el=document.getElementById(id);if(el&&val!=null)el.value=val;}
function restoreInputs(){
  sv('f-n',S.form.entryName);sv('f-pn',S.form.participantName);
  sv('f-e',S.form.email);sv('f-pw',S.form.password);sv('f-tb',S.form.tiebreaker);
  sv('el-n',S.editLookupForm.nameOrEmail);sv('el-p',S.editLookupForm.password);
  sv('a-pw',S.adminPW);sv('a-tg',S.results&&S.results.totalGoals?S.results.totalGoals:'');
}

/* ── EVENTS ── */
function bindEvents(){
  document.getElementById('root').addEventListener('click',function(e){
    var el=e.target.closest('[data-action]');if(!el)return;
    var act=el.dataset.action;
    if(act==='nav'){if(el.dataset.v==='bracket'){goToMyBracket();}else{S.view=el.dataset.v;}S.expLb=null;render();}
    else if(act==='pick'){
      var round=el.dataset.round,gIdx=parseInt(el.dataset.game),team=el.dataset.team;
      if(round==='r32'){S.picks.r32[gIdx]=team;}
      else if(round==='r16'){S.picks.r16[gIdx]=team;}
      else if(round==='qf'){S.picks.qf[gIdx]=team;}
      else if(round==='sf'){S.picks.sf[gIdx]=team;}
      else if(round==='f'){S.picks.f=team;}
      S.picks=validatePicks(S.picks);applyKnownResults();render();
    }
    else if(act==='fix-r32-pick'){
      /* User clicked the actual R32 winner to correct a wrong pick.
         Per spec: set R16 to the winner, clear any downstream picks with the loser. */
      var gIdx=parseInt(el.dataset.game),winner=el.dataset.team;
      S.picks.r32[gIdx]=winner;
      /* Force the R16 slot that this R32 game feeds into to also be the winner */
      var r16idx=R16_FEED.findIndex(function(f){return f.indexOf(gIdx)>=0;});
      if(r16idx>=0)S.picks.r16[r16idx]=winner;
      /* validatePicks cascades: clears QF/SF/Final picks that had the eliminated team */
      S.picks=validatePicks(S.picks);
      applyKnownResults();
      render();
    }
    else if(act==='submit-bracket'){doSubmitBracket();}
    else if(act==='update-bracket'){doUpdateBracket();}
    else if(act==='submit-edit'){doEditLookup();}
    else if(act==='edit-lookup-toggle'){S.editLookup=!S.editLookup;S.editErr='';S.editId=null;render();}
    else if(act==='cancel-edit'){S.editId=null;S.editLookup=true;S.adminEditId=null;S.picks=initPicks();S.autoFixed=0;S.emailExists=false;S.form={entryName:'',participantName:'',email:'',password:'',tiebreaker:''};S.submitErr='';render();}
    else if(act==='view-my-bracket'){var me=S.subs.find(function(s){return s.email&&s.email.toLowerCase()===S.form.email.toLowerCase();});if(me){S.editId=me.id;S.picks=JSON.parse(JSON.stringify(me.picks));applyKnownResults(true);S.form={entryName:me.entryName,participantName:me.participantName,email:me.email,tiebreaker:me.tiebreaker,password:me.password||''};}S.submitDone=false;S.view='bracket';render();}
    else if(act==='refresh-lb'){loadData();}
    else if(act==='refresh-invalid'){loadData();}
    else if(act==='exp-lb'){S.expLb=S.expLb===el.dataset.id?null:el.dataset.id;render();}
    else if(act==='show-admin-pw'){S.lbAdminMode=true;render();}
    else if(act==='cancel-admin-pw'){S.lbAdminMode=false;S.adminPW='';S.adminPWErr='';render();}
    else if(act==='try-admin'){doTryAdmin();}
    else if(act==='admin-tab'){S.adminTab=el.dataset.t;render();}
    else if(act==='save-bracket-results'){
      if(!S.results)S.results={r32:Array(16).fill(null),r16:Array(8).fill(null),qf:Array(4).fill(null),sf:Array(2).fill(null),f:null,totalGoals:''};
      azUpsert('bresults',{PartitionKey:'results',RowKey:'main',data:JSON.stringify(S.results)}).then(function(){S.adminSaved=true;render();setTimeout(function(){S.adminSaved=false;render();},2500);});
    }
    else if(act==='set-result'){
      var round=el.dataset.round,idx=parseInt(el.dataset.idx),val=el.value;
      if(!S.results)S.results={r32:Array(16).fill(null),r16:Array(8).fill(null),qf:Array(4).fill(null),sf:Array(2).fill(null),f:null,totalGoals:''};
      if(round==='f'){S.results.f=val||null;}
      else{if(!S.results[round])S.results[round]=Array(round==='r32'?16:round==='r16'?8:round==='qf'?4:2).fill(null);S.results[round][idx]=val||null;}
      /* Auto-save on change */
      azUpsert('bresults',{PartitionKey:'results',RowKey:'main',data:JSON.stringify(S.results)});
      render();
    }
    else if(act==='admin-edit-bracket'){doAdminEditBracket(el.dataset.id);}
    else if(act==='del-bracket'){
      if(!confirm('Delete bracket "'+el.dataset.name+'"?'))return;
      azDel('bpicks','subs',el.dataset.id);
      S.subs=S.subs.filter(function(s){return s.id!==el.dataset.id;});render();
    }
    else if(act==='clear-all-brackets'){
      if(!confirm('Delete ALL bracket entries? This cannot be undone.'))return;
      azDelAll('bpicks','subs').then(function(){S.subs=[];render();});
    }
    else if(act==='export-invalid-csv'){doExportInvalidCSV();}
    else if(act==='export-bracket-csv'){doExportBracketCSV();}
  });
}

/* ── BOOTSTRAP ── */
bindEvents();
loadData();
</script>
