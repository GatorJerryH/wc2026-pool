*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh}
.fade{animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
input:focus{outline:none;box-shadow:0 0 0 2px rgba(30,58,95,.3)}

input[type=number]{-moz-appearance:textfield}
button:focus{outline:none}
.tbtn{transition:all .12s ease}
.tbtn:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.12)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
/* Three-column submit layout */
.submit-layout{display:flex;align-items:flex-start;gap:14px;width:100%;padding:14px 6px 52px}
.pane-left{width:520px;flex-shrink:0;position:sticky;top:14px;align-self:flex-start;max-height:calc(100vh - 28px);overflow-y:auto}
.pane-center{flex:1;min-width:0}
.pane-right{width:420px;flex-shrink:0;position:sticky;top:14px;align-self:flex-start}
/* Single-column layout for leaderboard/admin */
.single-col{max-width:720px;margin:0 auto;padding:13px 11px 52px}
@media(max-width:900px){
  .submit-layout{flex-direction:column}
  .pane-left,.pane-right{width:100%;position:static;max-height:none}
}
</style>

function timeUntilDeadline(){

/* ── AZURE HELPERS ── */
function azUrl(table,pk,rk){
  if(pk&&rk) return AZ_BASE+'/'+table+'(PartitionKey=\''+pk+'\',RowKey=\''+rk+'\')'+AZ_SAS;
  return AZ_BASE+'/'+table+'()'+AZ_SAS;
}
function azQuery(table,pk){
  var url=azUrl(table)+'&$filter=PartitionKey%20eq%20\''+pk+'\'';
  return fetch(url,{headers:AZ_HDR}).then(function(r){return r.json();}).then(function(d){return d&&d.value?d.value:[];}).catch(function(){return [];});
}
function azGet(table,pk,rk){
  return fetch(azUrl(table,pk,rk),{headers:AZ_HDR}).then(function(r){return r.status===404?null:r.json();}).catch(function(){return null;});
}
function azInsert(table,entity){
  return fetch(AZ_BASE+'/'+table+AZ_SAS,{method:'POST',headers:AZ_HDR,body:JSON.stringify(entity)}).then(function(r){return r.ok;}).catch(function(){return false;});
}
function azUpsert(table,entity){
  return fetch(azUrl(table,entity.PartitionKey,entity.RowKey),{method:'PUT',headers:AZ_HDR,body:JSON.stringify(entity)}).then(function(r){return r.ok;}).catch(function(){return false;});
}
function azDel(table,pk,rk){
  return fetch(azUrl(table,pk,rk),{method:'DELETE',headers:AZ_HDR_IF}).then(function(r){return r.ok;}).catch(function(){return false;});
}
function azDelAll(table,pk){
  return azQuery(table,pk).then(function(rows){return Promise.all(rows.map(function(e){return azDel(table,e.PartitionKey,e.RowKey);}));});
}

function loadData(){
  Promise.all([azQuery('picks','subs'),azGet('results','results','main')]).then(function(res){
    var rows=res[0],rEnt=res[1];
    S.subs=rows.map(function(e){
      return {id:e.RowKey,entryName:e.entryName,participantName:e.participantName,email:e.email,
              tiebreaker:e.tiebreaker,picks:JSON.parse(e.picksData||'{}'),timestamp:e.timestamp};
    });
    S.results=loadResults(rEnt?JSON.parse(rEnt.data||'null'):null);
    S.draftR=JSON.parse(JSON.stringify(S.results));
    render();
  }).catch(function(){S.results=initResults();S.draftR=JSON.parse(JSON.stringify(S.results));render();});
}
function writeResults(){
  return azUpsert('results',{PartitionKey:'results',RowKey:'main',data:JSON.stringify(S.draftR)}).then(function(){S.results=JSON.parse(JSON.stringify(S.draftR));});
}

/* ── RESULTS HELPERS ── */
function makeMatchups(g){var t=GROUPS[g],m=[];for(var i=0;i<4;i++)for(var j=i+1;j<4;j++)m.push({t1:t[i],t2:t[j],s1:"",s2:""});return m;}
function initResults(){var groups={},games={};GL.forEach(function(g){groups[g]={first:null,second:null};games[g]=makeMatchups(g);});return{groups:groups,games:games,totalGoals:""};}
function loadResults(raw){
  if(!raw)return initResults();
  if(!raw.groups){var r=initResults();GL.forEach(function(g){if(raw[g])r.groups[g]={first:raw[g][0]||null,second:raw[g][1]||null};});return r;}
  var base=initResults();
  GL.forEach(function(g){if(raw.groups[g])base.groups[g]=raw.groups[g];if(raw.games&&raw.games[g])base.games[g]=raw.games[g];});
  base.totalGoals=raw.totalGoals||"";return base;
}

/* ── SCORING ──
   Pick1 = actual 1st  → 5 pts
   Pick1 = actual 2nd  → 3 pts
   Pick2 = actual 2nd  → 3 pts
   Pick2 = actual 1st  → 5 pts  ← NEW: runner-up pick won the group
   Both correct in exact order → +5 bonus
   Max per group: 13 pts | Max total: 156 pts
*/
function calcScore(picks,results){
  if(!results||!results.groups)return null;
  var total=0;
  GL.forEach(function(g){
    var pp=picks[g]||[],p1=pp[0],p2=pp[1];
    var grp=results.groups[g]||{},af=grp.first,as_=grp.second;
    if(!af||!as_)return;
    if(p1===af)total+=5;else if(p1===as_)total+=3;
    if(p2===as_)total+=3;else if(p2===af)total+=5;
    if(p1===af&&p2===as_)total+=5;
  });
  return total;
}
function groupPts(picks,g,results){
  var pp=picks[g]||[],p1=pp[0],p2=pp[1];
  var grp=(results&&results.groups&&results.groups[g])||{},af=grp.first,as_=grp.second;
  if(!af||!as_)return null;
  var pts=0;
  if(p1===af)pts+=5;else if(p1===as_)pts+=3;
  if(p2===as_)pts+=3;else if(p2===af)pts+=5;
  if(p1===af&&p2===as_)pts+=5;
  return pts;
}
function getTG(results){if(results&&results.totalGoals!=null&&results.totalGoals!=="")return Number(results.totalGoals);return null;}
function rankEntries(subs,results){
  var tg=getTG(results);
  return subs.slice().map(function(s){return Object.assign({},s,{score:calcScore(s.picks,results),tbDiff:tg!=null?Math.abs(Number(s.tiebreaker)-tg):null});})
    .sort(function(a,b){if((b.score||0)!==(a.score||0))return(b.score||0)-(a.score||0);if(a.tbDiff!=null&&b.tbDiff!=null&&a.tbDiff!==b.tbDiff)return a.tbDiff-b.tbDiff;return new Date(a.timestamp)-new Date(b.timestamp);});
}

/* ── STANDINGS CALCULATION ── */
function getH2H(teams, games){
  var h={};
  teams.forEach(function(t){h[t]={pts:0,gf:0,ga:0};});
  (games||[]).forEach(function(m){
    var a=parseInt(m.s1),b=parseInt(m.s2);
    if(isNaN(a)||isNaN(b)||m.s1===''||m.s2==='')return;
    if(teams.indexOf(m.t1)<0||teams.indexOf(m.t2)<0)return;
    h[m.t1].gf+=a;h[m.t1].ga+=b;h[m.t2].gf+=b;h[m.t2].ga+=a;
    if(a>b)h[m.t1].pts+=3;else if(b>a)h[m.t2].pts+=3;else{h[m.t1].pts++;h[m.t2].pts++;}
  });
  return h;
}

function calcStandings(g,games){
  var teams=GROUPS[g],s={};
  teams.forEach(function(t){s[t]={team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};});
  (games||[]).forEach(function(m){
    var a=parseInt(m.s1),b=parseInt(m.s2);
    if(isNaN(a)||isNaN(b)||m.s1===''||m.s2==='')return;
    var ta=s[m.t1],tb=s[m.t2];
    ta.p++;tb.p++;ta.gf+=a;ta.ga+=b;tb.gf+=b;tb.ga+=a;
    if(a>b){ta.w++;ta.pts+=3;tb.l++;}
    else if(b>a){tb.w++;tb.pts+=3;ta.l++;}
    else{ta.d++;ta.pts++;tb.d++;tb.pts++;}
  });
  teams.forEach(function(t){s[t].gd=s[t].gf-s[t].ga;});
  var arr=teams.map(function(t){return s[t];});
  /* Primary sort */
  arr.sort(function(a,b){
    if(b.pts!==a.pts)return b.pts-a.pts;
    if(b.gd!==a.gd)return b.gd-a.gd;
    if(b.gf!==a.gf)return b.gf-a.gf;
    return 0;
  });
  /* H2H tiebreaker for groups with identical pts/gd/gf */
  var i=0;
  while(i<arr.length){
    var j=i+1;
    while(j<arr.length&&arr[j].pts===arr[i].pts&&arr[j].gd===arr[i].gd&&arr[j].gf===arr[i].gf)j++;
    if(j-i>1){
      var tied=arr.slice(i,j).map(function(x){return x.team;});
      var h=getH2H(tied,games);
      var sub=arr.slice(i,j).slice().sort(function(a,b){
        var ha=h[a.team],hb=h[b.team];
        if(hb.pts!==ha.pts)return hb.pts-ha.pts;
        var agd=ha.gf-ha.ga,bgd=hb.gf-hb.ga;
        if(bgd!==agd)return bgd-agd;
        if(hb.gf!==ha.gf)return hb.gf-ha.gf;
        return 0;
      });
      for(var k=0;k<sub.length;k++)arr[i+k]=sub[k];
    }
    i=j;
  }
  return arr;
}

function buildGroupStandings(g,games,picks){
  var standings=calcStandings(g,games||[]);
  var anyPlayed=(games||[]).some(function(m){return m.s1!==''&&m.s1!=null&&m.s2!==''&&m.s2!=null;});
  var calcFirst=anyPlayed?standings[0].team:null;
  var calcSecond=anyPlayed?standings[1].team:null;
  var matchesCalc=picks[0]===calcFirst&&picks[1]===calcSecond;

  var html='<div id="st-'+g+'" style="margin-bottom:10px">';
  html+='<div style="font-size:11px;font-weight:700;letter-spacing:.5px;color:#64748b;margin-bottom:5px">📊 CALCULATED STANDINGS</div>';

  ['GP','W','D','L','GF','GA','GD','PTS'].forEach(function(h){
    var isPts=h==='PTS';
    html+='<th style="text-align:center;padding:4px 5px;font-weight:700;color:'+(isPts?'#059669':'#64748b')+';'+(isPts?'font-size:13px;':'')+'">'+(isPts?'<strong>'+h+'</strong>':h)+'</th>';
  });
  html+='</tr>';
  standings.forEach(function(s,i){
    var isTop=i<2&&anyPlayed;
    var bg=i===0&&anyPlayed?'#f0fdf4':i===1&&anyPlayed?'#eff6ff':'white';
    var medal=i===0&&anyPlayed?'🥇 ':i===1&&anyPlayed?'🥈 ':'';
    var gdStr=s.gd>0?'+'+s.gd:String(s.gd);
    var gdCol=s.gd>0?'#059669':s.gd<0?'#ef4444':'#64748b';
    html+='<tr style="background:'+bg+';border-top:1px solid #f1f5f9">';
    html+='<td style="padding:5px 7px;font-weight:'+(isTop?700:400)+'">'+medal+FLAGS[s.team]+' '+esc(s.team)+'</td>';
    html+='<td style="text-align:center;padding:5px">'+s.p+'</td>';
    html+='<td style="text-align:center;padding:5px">'+s.w+'</td>';
    html+='<td style="text-align:center;padding:5px">'+s.d+'</td>';
    html+='<td style="text-align:center;padding:5px">'+s.l+'</td>';
    html+='<td style="text-align:center;padding:5px">'+s.gf+'</td>';
    html+='<td style="text-align:center;padding:5px">'+s.ga+'</td>';
    html+='<td style="text-align:center;padding:5px;font-weight:700;color:'+gdCol+'">'+gdStr+'</td>';
    html+='<td style="text-align:center;padding:5px;font-weight:900;font-size:13px;color:'+(s.pts>0?'#059669':'#334155')+'">'+s.pts+'</td>';
    html+='</tr>';
  });
  html+='</table>';
  if(anyPlayed){
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;padding:5px 7px;background:#f8fafc;border-radius:6px">';
    html+='<div style="font-size:11px;color:#334155">Calculated: 🥇 '+esc(calcFirst)+' &nbsp;·&nbsp; 🥈 '+esc(calcSecond)+'</div>';
    if(!matchesCalc){
      html+='<button data-action="apply-calc" data-g="'+g+'" style="'+btn('#059669','padding:4px 12px;font-size:11px;letter-spacing:0')+'">Apply ✓</button>';
    }else{
      html+='<span style="font-size:11px;font-weight:700;color:#059669">✓ Applied</span>';
    }
    html+='</div>';
  }else{
    html+='<div style="font-size:11px;color:#94a3b8;margin-top:5px;padding:4px 7px">Enter game scores to auto-calculate standings.</div>';
  }
  html+='</div>';
  return html;
}

function buildGroupPicker(g,picks,mode,noWrapper){

  var filled=(p0?1:0)+(p1?1:0),done=filled===2;
  var inner='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<span style="background:#0f172a;color:white;padding:3px 11px;border-radius:5px;font-size:16px;font-weight:800;letter-spacing:1px">GROUP '+g+'</span>'
    +'<span style="font-size:16px;font-weight:700;color:'+(done?'#059669':filled>0?'#d97706':'#94a3b8')+';letter-spacing:.5px">'+(done?'✓ COMPLETE':filled+'/2 PICKED')+'</span>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'
    +GROUPS[g].map(function(team){
      var is1=p0===team,is2=p1===team,dis=(!is1&&!is2)&&filled>=2;
      return '<button data-action="'+mode+'" data-g="'+g+'" data-t="'+esc(team)+'" class="tbtn"'+(dis?' disabled':'')+' style="display:flex;align-items:center;gap:7px;padding:10px 12px;border-radius:8px;border:2px solid '+(is1?'#d97706':is2?'#4f46e5':'#e2e8f0')+';background:'+(is1?'#fffbeb':is2?'#eef2ff':dis?'#f8fafc':'white')+';color:'+(is1?'#92400e':is2?'#312e81':dis?'#cbd5e1':'#334155')+';cursor:'+(dis?'not-allowed':'pointer')+';font-family:inherit;font-weight:600;font-size:16px;text-align:left;width:100%">'
        +'<span style="font-size:20px;line-height:1;flex-shrink:0">'+FLAGS[team]+'</span>'
        +'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2">'+esc(team)+'</span>'
        +(is1?'<span style="font-size:12px;font-weight:800;color:#d97706;white-space:nowrap;flex-shrink:0">1ST🥇</span>':is2?'<span style="font-size:12px;font-weight:800;color:#4f46e5;white-space:nowrap;flex-shrink:0">2ND🥈</span>':'')
        +'</button>';
    }).join('')+'</div>'
    +(done?'<div style="margin-top:7px;font-size:14px;font-weight:700;color:#059669;letter-spacing:.3px">🏆 '+FLAGS[p0]+' '+esc(p0)+'  ·  🥈 '+FLAGS[p1]+' '+esc(p1)+'</div>'
      :(!done&&(p0||p1)?'<div style="margin-top:5px;font-size:13px;color:#94a3b8">'+(p0&&!p1?'🥇 '+esc(p0)+' — now pick the runner-up':!p0&&p1?'🥈 '+esc(p1)+' as runner-up — now pick the group winner':'')+'</div>':''));
  if(noWrapper)return inner;
  return '<div style="'+card('border:'+(done?'2px solid #d1fae5':filled>0?'2px solid #fde68a':'2px solid transparent')+';transition:border .2s')+'">'+inner+'</div>';
}

  var tg=getTG(S.results);
  var entries=rankEntries(S.subs,S.results);
  var medals=['🥇','🥈','🥉'];

  var left='';
  left+='<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px">'
    +'<div style="'+card('background:'+(hasRes?'#d1fae5':'#fef3c7')+';border:none;margin-bottom:0;flex:1')+'"><span style="font-size:11px;font-weight:700;letter-spacing:.5px;color:'+(hasRes?'#065f46':'#92400e')+'">'+(hasRes?'✅ RESULTS ARE LIVE · Ties broken by closest goals guess':'⏳ AWAITING RESULTS — Scores appear after the group stage completes')+'</span></div>'
    +'<button data-action="refresh-lb" style="'+btn('#1e3a5f','padding:8px 14px;font-size:12px;white-space:nowrap;flex-shrink:0')+'">⟳ Refresh</button></div>';

    var rBg=i===0&&hasRes?'#d97706':i===1&&hasRes?'#9ca3af':i===2&&hasRes?'#b45309':'#f1f5f9';
    var rCol=i<3&&hasRes?'white':'#64748b';
    left+='<div style="'+card('margin-bottom:7px;overflow:hidden;padding:0')+'">'
      +'<button data-action="exp-lb" data-id="'+s.id+'" style="width:100%;padding:11px 13px;display:flex;align-items:center;gap:9px;background:none;border:none;cursor:pointer;text-align:left;font-family:inherit">'
      +'<div style="width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:'+rBg+';font-size:'+(i<3&&hasRes?'17':'13')+'px;font-weight:800;color:'+rCol+'">'+(hasRes?(i<3?medals[i]:String(i+1)):'–')+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:16px;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(s.entryName)+'</div>'
      +'<div style="font-size:13px;color:#94a3b8;margin-top:2px">'+esc(s.participantName)+'</div></div>'
      +'<div style="text-align:right;flex-shrink:0">'+(hasRes?'<span style="font-size:22px;font-weight:900;color:#059669">'+s.score+'</span><span style="font-size:13px;font-weight:600;color:#94a3b8">/156</span>':'<span style="font-size:13px;font-weight:600;color:#94a3b8;letter-spacing:.5px">PENDING</span>')
      +(tg!=null?'<div style="font-size:11px;color:#94a3b8;margin-top:1px">TB:'+s.tiebreaker+' <span style="color:'+(s.tbDiff===0?'#059669':s.tbDiff<=5?'#d97706':'#94a3b8')+'">±'+s.tbDiff+'</span></div>':'')
      +'</div><span style="color:#94a3b8;font-size:11px;flex-shrink:0;margin-left:4px">'+(isExp?'▲':'▼')+'</span></button>'
      +(isExp?buildPickBreakdown(s.picks,s.tiebreaker,S.results):'')+'</div>';
  });
  if(entries.length>0)left+='<div style="font-size:10px;color:#94a3b8;padding:7px 4px;line-height:1.7"><strong>Scoring:</strong> Winner=5 · Runner-up=3 · Winner pick finishes 2nd=3 · Runner-up pick wins group=5 · Both in order=+5 bonus · Max 156pts</div>';
  left+='<div style="margin-top:22px;border-top:1px solid #e2e8f0;padding-top:14px;text-align:center">';
  if(!S.lbAdminMode){
    left+='<button data-action="show-admin-pw" style="background:none;border:none;color:#94a3b8;font-size:10px;cursor:pointer;text-decoration:underline;font-family:inherit">⚙ Admin Access</button>';
  } else {
    left+='<div style="'+card('max-width:300px;margin:0 auto;padding:13px')+'">'
      +'<div style="font-size:11px;font-weight:700;letter-spacing:1px;color:#64748b;margin-bottom:7px">ADMIN PASSWORD</div>'
      +'<input id="a-pw" type="password" placeholder="Password..." style="'+inp('margin-bottom:7px')+'" oninput="S.adminPW=this.value" onkeydown="if(event.key===\'Enter\')doTryAdmin()">'
      +(S.adminPWErr?'<div style="color:#dc2626;font-size:10px;margin-bottom:6px">'+esc(S.adminPWErr)+'</div>':'')
      +'<div style="display:flex;gap:6px"><button data-action="try-admin" style="'+btn('#0f172a','flex:1;padding:8px;font-size:11px')+'">ENTER</button>'
      +'<button data-action="cancel-admin-pw" style="'+btn('#94a3b8','flex:1;padding:8px;font-size:11px')+'">CANCEL</button></div></div>';
  }
  left+='</div>';

  /* RIGHT PANE: group results */
  var right='<div style="font-size:16px;font-weight:800;letter-spacing:1px;color:#0f172a;margin-bottom:10px;padding:4px 0">GROUP RESULTS</div>';
  right+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">';
  GL.forEach(function(g){ right+=buildGroupResultCard(g); });
  right+='</div>';

  return '<div class="submit-layout fade">'
    +'<div class="pane-left">'+left+'</div>'
    +'<div style="flex:1;min-width:0">'+right+'</div>'
    +'</div>';
}

function buildGroupResultCard(g){
  var grp=S.results&&S.results.groups&&S.results.groups[g];
  var games=S.results&&S.results.games&&S.results.games[g];
  var hasScores=games&&games.some(function(m){return m.s1!==''&&m.s1!=null&&m.s2!==''&&m.s2!=null;});
  var hasResult=grp&&(grp.first||grp.second);
  var isComplete=grp&&grp.first&&grp.second;

  var html='<div style="'+card('padding:12px 14px;border:'+(isComplete?'2px solid #d1fae5':'2px solid transparent'))+'">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  html+='<span style="background:#0f172a;color:white;padding:3px 11px;border-radius:5px;font-size:16px;font-weight:800;letter-spacing:1px">GROUP '+g+'</span>';
  html+='<span style="font-size:14px;font-weight:700;color:'+(isComplete?'#059669':'#94a3b8')+'">'+(isComplete?'✓':'⏳')+'</span>';
  html+='</div>';

  if(hasScores){
    var standings=calcStandings(g,games);
    html+='<table style="width:100%;border-collapse:collapse;font-size:16px">';
    standings.forEach(function(s,i){
      var isTop=i<2&&isComplete;
      var bg=i===0&&isComplete?'#f0fdf4':i===1&&isComplete?'#eff6ff':'white';
      var medal=i===0&&isComplete?'🥇 ':i===1&&isComplete?'🥈 ':'      ';
      html+='<tr style="background:'+bg+';border-top:'+(i>0?'1px solid #f1f5f9':'none')+'">'
        +'<td style="padding:5px 4px;font-weight:'+(isTop?700:400)+'">'+medal+FLAGS[s.team]+' <span style="font-size:16px">'+esc(s.team)+'</span></td>'
        +'<td style="text-align:right;padding:5px 4px;font-weight:800;color:'+(s.pts>0?'#059669':'#94a3b8')+'">'+s.pts+'<span style="font-size:12px;font-weight:400;color:#94a3b8">pts</span></td>'
        +'<td style="text-align:right;padding:5px 4px;font-size:13px;color:#94a3b8;white-space:nowrap">'+s.w+'W '+s.d+'D '+s.l+'L</td>'
        +'</tr>';
    });
    html+='</table>';
  } else if(hasResult){
    if(grp.first)  html+='<div style="font-size:16px;margin-bottom:6px">🥇 '+FLAGS[grp.first]+' '+esc(grp.first)+'</div>';
    if(grp.second) html+='<div style="font-size:16px">🥈 '+FLAGS[grp.second]+' '+esc(grp.second)+'</div>';
  } else {
    html+='<div style="font-size:14px;color:#94a3b8;padding:4px 0">No results yet</div>';
  }

  html+='</div>';
  return html;
}
function buildPickBreakdown(picks,tiebreaker,results){
  var hasRes=results&&results.groups&&GL.some(function(g){return results.groups[g]&&results.groups[g].first;});
  var tg=getTG(results);
  var html='<div style="border-top:1px solid #f1f5f9;padding:10px 13px;background:#fafafa">'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px 8px;margin-bottom:8px">';
  GL.forEach(function(g){
    var pp=picks[g]||[],p1=pp[0],p2=pp[1];
    var af=results&&results.groups&&results.groups[g]&&results.groups[g].first;
    var as_=results&&results.groups&&results.groups[g]&&results.groups[g].second;
    var pts=hasRes&&af&&as_?groupPts(picks,g,results):null;
    html+='<div style="background:white;border-radius:7px;padding:5px 7px;border:1px solid #e2e8f0">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:9px;font-weight:800;color:#64748b;letter-spacing:.5px"><span>GRP '+g+'</span>'
      +(pts!=null?'<span style="color:'+(pts>=13?'#059669':pts>=6?'#d97706':'#ef4444')+'">'+pts+'pt</span>':'')+'</div>'
      +(p1?pickLine(p1,'1ST',af,as_,hasRes):'')+(p2?pickLine(p2,'2ND',af,as_,hasRes):'')+'</div>';
  });
  html+='</div><div style="font-size:10px;color:#64748b">⚖ TB guess: <strong>'+tiebreaker+'</strong>'+(tg!=null?' · actual: '+tg+' · diff: ±'+Math.abs(tiebreaker-tg):'')+'</div></div>';
  return html;
}
function pickLine(team,label,af,as_,hr){
  var hasResult=hr&&af&&as_;
  var exact=hasResult&&((label==='1ST'&&team===af)||(label==='2ND'&&team===as_));
  var partial=hasResult&&!exact&&(team===af||team===as_);
  var bad=hasResult&&!exact&&!partial;
  var color=exact?'#059669':partial?'#d97706':bad?'#ef4444':'#334155';
  var icon=exact?'\u2713 ':partial?'\u21c4 ':bad?'\u2717 ':'';
  var decoration=bad?'line-through':'none';
  var note=partial?(' ('+(label==='1ST'?'2nd':'1st')+')'):'';
  return '<div style="display:flex;align-items:center;gap:2px;margin-bottom:1px;font-size:9px">'
    +'<span style="font-size:8px;font-weight:800;color:'+(label==='1ST'?'#d97706':'#4f46e5')+';min-width:20px">'+label+'</span>'
    +'<span style="font-size:12px">'+FLAGS[team]+'</span>'
    +'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:'+color+';text-decoration:'+decoration+'">'+icon+esc(team)+note+'</span></div>';
}

function buildAdminResults(){
  var completed=GL.filter(function(g){return S.draftR&&S.draftR.groups&&S.draftR.groups[g]&&S.draftR.groups[g].first&&S.draftR.groups[g].second;}).length;
  var allGoals=0;
  if(S.draftR&&S.draftR.games)GL.forEach(function(g){(S.draftR.games[g]||[]).forEach(function(m){var a=parseInt(m.s1),b=parseInt(m.s2);allGoals+=(isNaN(a)?0:a)+(isNaN(b)?0:b);});});
  var html='<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:9px;padding:8px 12px;margin-bottom:9px;font-size:11px;font-weight:600;color:#1e40af;letter-spacing:.5px">SELECT 1ST AND 2ND PLACE FOR EACH GROUP · '+completed+'/12 COMPLETE</div>';
  GL.forEach(function(g){
    var grp=(S.draftR&&S.draftR.groups&&S.draftR.groups[g])||{};
    var picks=[grp.first||null,grp.second||null];
    var done=!!(picks[0]&&picks[1]);
    var isExpG=S.expGame===g;
    var games=(S.draftR&&S.draftR.games&&S.draftR.games[g])||[];
    var grpGoals=games.reduce(function(s,m){var a=parseInt(m.s1),b=parseInt(m.s2);return s+(isNaN(a)?0:a)+(isNaN(b)?0:b);},0);
    html+='<div style="'+card('padding:0;overflow:hidden;border:'+(done?'2px solid #d1fae5':'2px solid transparent')+';transition:border .2s')+'">'
      +'<div style="padding:12px 13px">'
      +buildGroupStandings(g,games,picks)
      +'<div style="font-size:10px;font-weight:700;letter-spacing:.5px;color:#64748b;margin:8px 0 5px;padding-top:8px;border-top:1px solid #f1f5f9">MANUAL OVERRIDE</div>'
      +buildGroupPicker(g,picks,'rpick',true)
      +'</div>'
      +'<button data-action="exp-game" data-g="'+g+'" style="width:100%;padding:6px 13px;background:#f8fafc;border:none;border-top:1px solid #f1f5f9;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:inherit">'
      +'<span style="font-size:10px;font-weight:700;letter-spacing:.5px;color:#64748b">📅 GAME SCORES'+(grpGoals>0?' — '+grpGoals+' goals in this group':'')+'</span>'
      +'<span style="color:#94a3b8;font-size:9px">'+(isExpG?'▲':'▼')+'</span></button>'
      +(isExpG?buildGameScores(g,games):'')+'</div>';
  });
  html+='<div style="'+card('border:2px solid #fbbf24')+'">'
    +'<div style="font-size:12px;font-weight:800;letter-spacing:1px;color:#0f172a;margin-bottom:4px">⚖ TIEBREAKER — ACTUAL QUALIFYING GOALS</div>'
    +'<p style="font-size:11px;color:#64748b;margin-bottom:8px;line-height:1.5">Total goals scored during group play by all 32 teams advancing to the knockout stage.'
    +(allGoals>0?' <span style="color:#94a3b8">📊 All game scores sum: <strong>'+allGoals+'</strong> goals.</span>':'')+'</p>'
    +'<label style="'+lbl()+'">ACTUAL TOTAL GOALS BY 32 QUALIFYING TEAMS</label>'
    +'<input id="a-totalGoals" type="number" min="0" placeholder="e.g. 85" style="'+inp('max-width:170px')+'" oninput="S.draftR.totalGoals=this.value"></div>'
    +'<button data-action="save-results" style="'+btn('#059669','width:100%;padding:13px;font-size:13px;letter-spacing:1px')+'">'+(S.adminSaved?'✅  RESULTS SAVED — SCORES UPDATED':'SAVE ALL RESULTS & CALCULATE SCORES')+'</button>';
  return html;
}

function buildGameScores(g,games){
  var html='<div style="padding:9px 13px;border-top:1px solid #f1f5f9;display:grid;grid-template-columns:1fr 1fr;gap:7px">';
  games.forEach(function(m,idx){
    html+='<div style="background:#f8fafc;border-radius:7px;padding:7px 8px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;font-size:10px;font-weight:600;color:#334155">'
      +'<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:43%">'+FLAGS[m.t1]+' '+(m.t1.length>8?m.t1.slice(0,8)+'…':m.t1)+'</span>'
      +'<span style="color:#94a3b8;font-size:8px;flex-shrink:0">vs</span>'
      +'<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:43%;text-align:right">'+FLAGS[m.t2]+' '+(m.t2.length>8?m.t2.slice(0,8)+'…':m.t2)+'</span></div>'
      +'<div style="display:flex;align-items:center;gap:4px;justify-content:center">'
      +'<input id="gs-'+g+'-'+idx+'-s1" type="number" min="0" value="'+esc(m.s1)+'" style="width:38px;border:1px solid #e2e8f0;border-radius:5px;padding:3px;text-align:center;font-size:15px;font-weight:700;font-family:inherit" oninput="onScoreInput(\''+g+'\','+idx+',\'s1\',this.value)">'
      +'<span style="color:#94a3b8;font-weight:700">:</span>'
      +'<input id="gs-'+g+'-'+idx+'-s2" type="number" min="0" value="'+esc(m.s2)+'" style="width:38px;border:1px solid #e2e8f0;border-radius:5px;padding:3px;text-align:center;font-size:15px;font-weight:700;font-family:inherit" oninput="onScoreInput(\''+g+'\','+idx+',\'s2\',this.value)">'
      +'</div></div>';
  });
  return html+'</div>';
}

      +'<div style="font-size:9px;color:#94a3b8">'+new Date(s.timestamp).toLocaleString()+'</div></div>'
      +'<div style="text-align:right;flex-shrink:0">'+(hasRes?'<div style="font-size:18px;font-weight:900;color:#059669">'+s.score+'<span style="font-size:10px;font-weight:600;color:#94a3b8">/156</span></div>':'')
      +(tbDiff!=null?'<div style="font-size:9px;color:#64748b">TB:'+s.tiebreaker+' <span style="color:'+(tbDiff===0?'#059669':tbDiff<=5?'#d97706':'#94a3b8')+'">±'+tbDiff+'</span></div>':'')+'</div>'
      +'<span style="color:#94a3b8;font-size:9px;flex-shrink:0;margin-left:4px">'+(isExp?'▲':'▼')+'</span></button>'
      +'<button data-action="del-entry" data-id="'+s.id+'" data-name="'+esc(s.entryName)+'" data-participant="'+esc(s.participantName)+'" title="Delete this entry" style="background:#fef2f2;border:1px solid #fecaca;border-radius:7px;padding:5px 8px;cursor:pointer;color:#dc2626;font-size:13px;flex-shrink:0;line-height:1;font-family:inherit">🗑</button>'
      +'</div>'+(isExp?buildPickBreakdown(s.picks,s.tiebreaker,S.results):'')+'</div>';
  });
  return html;
}

/* ── EVENTS (bound once at init) ── */
function bindEvents(){
  document.getElementById('root').addEventListener('click',function(e){
    var el=e.target.closest('[data-action]');if(!el)return;
    var act=el.dataset.action;
    if(act==='view'){S.view=el.dataset.v;S.expLb=null;render();}
    else if(act==='refresh-lb'){loadData();}
    else if(act==='pick'){doTogglePick(el.dataset.g,el.dataset.t);}
    else if(act==='rpick'){doToggleRPick(el.dataset.g,el.dataset.t);}
    else if(act==='submit'){doSubmit();}
    else if(act==='new-submit'){S.submitDone=false;S.form={entryName:'',participantName:'',email:'',tiebreaker:''};S.picks=initPicks();S.submitErr='';render();}
    else if(act==='exp-lb'){S.expLb=S.expLb===el.dataset.id?null:el.dataset.id;render();}
    else if(act==='exp-sub'){S.expSub=S.expSub===el.dataset.id?null:el.dataset.id;render();}
    else if(act==='exp-game'){S.expGame=S.expGame===el.dataset.g?null:el.dataset.g;render();}
    else if(act==='show-admin-pw'){S.lbAdminMode=true;render();}
    else if(act==='cancel-admin-pw'){S.lbAdminMode=false;S.adminPW='';S.adminPWErr='';render();}
    else if(act==='try-admin'){doTryAdmin();}
    else if(act==='back-to-lb'){S.view='leaderboard';render();}
    else if(act==='admin-tab'){S.adminTab=el.dataset.tab;render();}
    else if(act==='apply-calc'){doApplyCalc(el.dataset.g);}
    else if(act==='save-results'){doSaveResults();}
    else if(act==='del-entry'){doDelete(el.dataset.id,el.dataset.name,el.dataset.participant);}
    else if(act==='clear-all'){if(confirm('Delete ALL entries? Cannot be undone.'))doClearAll();}
    else if(act==='export-csv'){doExportCSV();}
  });
}

function doTogglePick(g,team){
  var p=(S.picks[g]||[null,null]).slice();while(p.length<2)p.push(null);
  if(p[0]===team){p[0]=null;}
  else if(p[1]===team){p[1]=null;}
  else if(!p[0]){p[0]=team;}
  else if(!p[1]){p[1]=team;}
  S.picks[g]=p;render();
}
function doToggleRPick(g,team){
  var grp=S.draftR.groups[g],first=grp.first,second=grp.second;
  if(first===team)S.draftR.groups[g]={first:null,second:second};
  else if(second===team)S.draftR.groups[g]={first:first,second:null};
  else if(!first)S.draftR.groups[g]={first:team,second:second};
  else if(!second)S.draftR.groups[g]={first:first,second:team};
  if(!S.results)S.results=initResults();
  S.results.groups[g]=S.draftR.groups[g];
  azUpsert('results',{PartitionKey:'results',RowKey:'main',data:JSON.stringify(S.draftR)});
  render();
}
function doTryAdmin(){if(S.adminPW===ADMIN_PW){S.view='admin';S.lbAdminMode=false;S.adminPWErr='';render();}else{S.adminPWErr='Incorrect password.';render();}}
window.doTryAdmin=doTryAdmin;

function doSubmit(){
  if(isPastDeadline()){S.submitErr='Submissions are closed. Pool play began June 11 at 3:00 PM ET.';render();return;}
  S.submitErr='';var f=S.form;
  if(!f.entryName.trim()){S.submitErr='Entry name is required.';render();return;}
  if(!f.participantName.trim()){S.submitErr='Participant name is required.';render();return;}
  if(!/^[^@]+@[^@]+\.[^@]+$/.test(f.email.trim())){S.submitErr='A valid email address is required.';render();return;}
  var completed=GL.filter(function(g){var p=S.picks[g]||[];return p[0]&&p[1];}).length;
  if(completed<12){S.submitErr='Pick 1st and 2nd place for all 12 groups. ('+completed+'/12 done)';render();return;}
  if(f.tiebreaker===''||isNaN(Number(f.tiebreaker))||Number(f.tiebreaker)<0){S.submitErr='Enter a valid tiebreaker guess (whole number ≥ 0).';render();return;}
  if(S.subs.filter(function(s){return s.entryName&&s.entryName.toLowerCase().trim()===f.entryName.toLowerCase().trim();}).length>0){S.submitErr='An entry with that name already exists.';render();return;}
  var sub={id:String(Date.now()),entryName:f.entryName.trim(),participantName:f.participantName.trim(),email:f.email.trim(),tiebreaker:Number(f.tiebreaker),picks:JSON.parse(JSON.stringify(S.picks)),timestamp:new Date().toISOString()};
  var entity={PartitionKey:'subs',RowKey:sub.id,entryName:sub.entryName,
    participantName:sub.participantName,email:sub.email,tiebreaker:sub.tiebreaker,
    picksData:JSON.stringify(sub.picks),timestamp:sub.timestamp};
  azInsert('picks',entity).then(function(ok){
    if(ok){S.subs.push(sub);S.submitDone=true;render();}
    else{S.submitErr='Failed to save. Please try again.';render();}
  });
}
function doSaveResults(){azUpsert('results',{PartitionKey:'results',RowKey:'main',data:JSON.stringify(S.draftR)}).then(function(){S.results=JSON.parse(JSON.stringify(S.draftR));S.adminSaved=true;render();setTimeout(function(){S.adminSaved=false;render();},2500);});}
function doDelete(id,name,participant){
  if(!confirm('Delete entry "'+name+'"?\nParticipant: '+participant+'\nThis cannot be undone.'))return;
  azDel('picks','subs',id);
  S.subs=S.subs.filter(function(s){return s.id!==id;});render();
}
function doClearAll(){azDelAll('picks','subs').then(function(){S.subs=[];render();});}
function doExportCSV(){
  var tg=getTG(S.results);
  var hdr=['Rank','Entry Name','Participant','Email','Score','TB Guess','TB Actual','TB Diff','Submitted'];
  GL.forEach(function(g){hdr.push('Group '+g+' 1st','Group '+g+' 2nd');});
  var rows=rankEntries(S.subs,S.results).map(function(s,i){
    var row=[i+1,'"'+s.entryName+'"','"'+s.participantName+'"','"'+s.email+'"',s.score!=null?s.score:'N/A',s.tiebreaker,tg!=null?tg:'N/A',tg!=null?Math.abs(s.tiebreaker-tg):'N/A','"'+new Date(s.timestamp).toLocaleString()+'"'];
    GL.forEach(function(g){var pp=s.picks[g]||[];row.push(pp[0]||'',pp[1]||'');});return row;
  });
  var csv=[hdr].concat(rows).map(function(r){return r.join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='wc2026_picks.csv';a.click();
}

/* ── INIT ── */
bindEvents();
loadData();
</script>
